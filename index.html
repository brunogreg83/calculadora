<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#1a4fa0">
<meta name="apple-mobile-web-app-title" content="AB Chemicals">
<title>Calculadora AB Chemicals</title>
<link rel="manifest" href="manifest.json">
<link rel="icon" href="icons/icon-192.png">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;800&family=Nunito:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
  :root{
    --blue:#1a4fa0;
    --blue-light:#2b7fff;
    --blue-dark:#0e3070;
    --blue-pale:#eef4ff;
    --white:#ffffff;
    --off-white:#f7faff;
    --gray:#d1dce8;
    --text:#0e1a2e;
    --text-muted:#5a7190;
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{height:100%;margin:0;padding:0;}
  body{
    background:linear-gradient(180deg,#f7faff 0%,#eef4ff 100%);
    color:var(--text);
    font-family:'Nunito',sans-serif;
    display:flex;
    justify-content:center;
    min-height:100vh;
  }
  .app{ 
    width:100%; 
    max-width:460px; 
    height:100vh;
    display:flex;
    flex-direction:column;
    padding:env(safe-area-inset-top) env(safe-area-inset-right) env(safe-area-inset-bottom) env(safe-area-inset-left);
  }

  footer{
    flex-shrink:0;
  }

  .card{
    background:var(--white);
    border-radius:0;
    box-shadow:0 20px 50px rgba(26,79,160,0.14);
    overflow:hidden;
    display:flex;
    flex-direction:column;
    flex:1;
  }
  .card-header{
    background:linear-gradient(135deg,var(--blue),var(--blue-light));
    padding:12px 16px;
    color:#fff;
    display:flex;
    align-items:center;
    gap:14px;
    flex-shrink:0;
    border-radius:0;
    min-height:80px;
    justify-content:flex-start;
  }
  .card-header .icon{
    flex-shrink:0;width:auto;height:auto;
    background:transparent;
    display:flex;align-items:center;justify-content:center;
  }
  .card-header .icon img{ height: 60px; width: auto; }
  .card-header .title{ font-family:'Montserrat',sans-serif;font-weight:800;font-size:1rem;line-height:1.15;margin:0;text-align:center; }
  .card-header .subtitle{ font-size:.7rem;color:rgba(255,255,255,.85);margin-top:1px;margin-bottom:0;text-align:center; }

  .card-body{ 
    padding:16px;
    display:flex;
    flex-direction:column;
    gap:16px;
    overflow-y:auto;
    flex:1;
  }

  .field-label{
    display:flex;align-items:center;gap:6px;
    font-weight:700;color:var(--text);margin-bottom:8px;font-size:.85rem;
  }

  .presets{ display:grid;grid-template-columns:repeat(4,1fr);gap:6px;margin-bottom:8px; }
  .presets button{
    padding:8px 0;border-radius:8px;font-size:.75rem;font-weight:700;
    border:none;cursor:pointer;transition:background .15s,color .15s;
    background:var(--off-white);color:var(--text-muted);
    font-family:'Nunito',sans-serif;
  }
  .presets button.active{ background:var(--blue);color:#fff; }

  .card-body::-webkit-scrollbar {
    width: 4px;
  }
  .card-body::-webkit-scrollbar-track {
    background: transparent;
  }
  .card-body::-webkit-scrollbar-thumb {
    background: rgba(26, 79, 160, 0.2);
    border-radius: 4px;
  }
  .card-body::-webkit-scrollbar-thumb:hover {
    background: rgba(26, 79, 160, 0.4);
  }

  .input-row{
    display:flex;align-items:center;justify-content:center;gap:6px;
    border:1.5px solid var(--gray);border-radius:10px;padding:8px 12px;
  }
  .input-row span.prefix{ font-weight:700;color:var(--text);font-size:.9rem;line-height:1; }
  .input-row span.suffix{ color:var(--text-muted);font-size:.8rem;line-height:1; }
  .input-row input{
    flex:1;border:none;outline:none;font-size:.95rem;color:var(--text);
    background:transparent;min-width:0;font-family:'Nunito',sans-serif;font-weight:600;text-align:center;line-height:1;
  }

  .divider{ height:1px;background:var(--gray);margin:4px 0; }

  .result-title{ font-size:.65rem;font-weight:800;letter-spacing:1.2px;color:var(--text-muted);margin-bottom:8px;text-align:center; }
  .result-grid{ display:flex;flex-direction:column;gap:8px; }
  .result-box{ background:var(--blue-pale);border-radius:12px;padding:12px;text-align:center;display:flex;flex-direction:column;align-items:center;justify-content:center; }
  .result-box .label{
    display:flex;align-items:center;justify-content:center;gap:4px;
    color:var(--blue);font-weight:700;font-size:.75rem;margin-bottom:2px;line-height:1;
  }
  .result-box .value{ font-family:'Montserrat',sans-serif;font-size:1.3rem;font-weight:800;color:var(--text);line-height:1; }
  .result-box .unit{ color:var(--text-muted);font-size:.75rem;line-height:1; }

  .concentration-box{
    background:var(--off-white);border-radius:12px;padding:12px;
    display:flex;align-items:center;gap:10px;justify-content:center;
  }
  .concentration-box .circle{
    flex-shrink:0;width:36px;height:36px;border-radius:50%;background:var(--blue-pale);
    display:flex;align-items:center;justify-content:center;
  }
  .concentration-box > div{
    display:flex;flex-direction:column;align-items:center;justify-content:center;
  }
  .concentration-box .label{ font-size:.65rem;font-weight:800;letter-spacing:1px;color:var(--text-muted);line-height:1; }
  .concentration-box .value{ font-family:'Montserrat',sans-serif;font-size:1.1rem;font-weight:800;color:var(--text);line-height:1; }

  .empty-state{ text-align:center;color:var(--text-muted);font-size:.8rem;padding-top:2px; }
</style>
</head>
<body>
<div class="app">

  <div class="card">
    <div class="card-header">
      <div class="icon">
        <img src="images/logo-emblema.png" alt="AB Chemicals">
      </div>
      <div style="display:flex;flex-direction:column;justify-content:center;align-items:center;flex:1;text-align:center;">
        <div class="title">Calculadora de Diluição</div>
        <div class="subtitle">Proporção correta para seus produtos</div>
      </div>
    </div>

    <div class="card-body">

      <div>
        <div class="field-label">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#1a4fa0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3h6M10 3v5.5L4.5 18a2 2 0 001.7 3h11.6a2 2 0 001.7-3L14 8.5V3"/></svg>
          Proporção (1:X)
        </div>
        <div id="dc-ratio-presets" class="presets"></div>
        <div class="input-row">
          <span class="prefix">1 :</span>
          <input id="dc-ratio-input" type="text" inputmode="decimal" placeholder="Ex: 100">
        </div>
      </div>

      <div>
        <div class="field-label">
          <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="#1a4fa0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 8a2 2 0 00-1-1.73l-7-4a2 2 0 00-2 0l-7 4A2 2 0 003 8v8a2 2 0 001 1.73l7 4a2 2 0 002 0l7-4A2 2 0 0021 16V8z"/><path d="M3.27 6.96L12 12.01l8.73-5.05M12 22.08V12"/></svg>
          Volume Final Desejado (Litros)
        </div>
        <div id="dc-volume-presets" class="presets"></div>
        <div class="input-row">
          <input id="dc-volume-input" type="text" inputmode="decimal" placeholder="Ex: 1">
          <span class="suffix">litros</span>
        </div>
      </div>

      <div class="divider"></div>

      <div>
        <div class="result-title">RESULTADO</div>
        <div class="result-grid">
          <div class="result-box">
            <div class="label">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="#1a4fa0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 3h6M10 3v5.5L4.5 18a2 2 0 001.7 3h11.6a2 2 0 001.7-3L14 8.5V3"/></svg>
              PRODUTO
            </div>
            <div id="dc-result-product" class="value">0</div>
            <div class="unit">mL</div>
          </div>
          <div class="result-box">
            <div class="label">
              <svg viewBox="0 0 24 24" width="15" height="15" fill="none" stroke="#1a4fa0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2.69l5.66 5.66a8 8 0 11-11.31 0z"/></svg>
              ÁGUA
            </div>
            <div id="dc-result-water" class="value">0</div>
            <div class="unit">mL</div>
          </div>
          <div class="concentration-box">
            <div class="circle">
              <svg viewBox="0 0 24 24" width="20" height="20" fill="none" stroke="#1a4fa0" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="5" x2="5" y2="19"/><circle cx="6.5" cy="6.5" r="2.5"/><circle cx="17.5" cy="17.5" r="2.5"/></svg>
            </div>
            <div>
              <div class="label">CONCENTRAÇÃO FINAL</div>
              <div id="dc-result-concentration" class="value">0%</div>
            </div>
          </div>
        </div>
        <div id="dc-empty-state" class="empty-state">Preencha a proporção e o volume para calcular a diluição.</div>
      </div>

    </div>
  </div>

  <footer style="text-align:center;padding:12px;font-size:.8rem;color:var(--text-muted);margin-top:auto;">
    <a href="https://www.abchemicals.com.br" target="_blank" style="color:var(--blue);text-decoration:none;font-weight:bold;">AB Chemicals - Soluções em Limpeza Profissional</a><br>
    (43) 98871-2001
  </footer>
</div>

<script>
(function(){
  var RATIO_PRESETS = [50, 100, 200, 500];
  var VOLUME_PRESETS = [1, 2, 5, 10];

  var ratioInput = document.getElementById('dc-ratio-input');
  var volumeInput = document.getElementById('dc-volume-input');
  var ratioPresetsEl = document.getElementById('dc-ratio-presets');
  var volumePresetsEl = document.getElementById('dc-volume-presets');
  var resultProduct = document.getElementById('dc-result-product');
  var resultWater = document.getElementById('dc-result-water');
  var resultConcentration = document.getElementById('dc-result-concentration');
  var emptyState = document.getElementById('dc-empty-state');

  function buildPresets(container, values, suffix, getCurrent, onSelect){
    container.innerHTML = '';
    values.forEach(function(v){
      var btn = document.createElement('button');
      btn.type = 'button';
      btn.textContent = (suffix === ':' ? '1:' + v : v + suffix);
      btn.className = (getCurrent() === v ? 'active' : '');
      btn.addEventListener('click', function(){ onSelect(v); });
      container.appendChild(btn);
    });
  }

  function fmt(n){
    return n.toLocaleString('pt-BR', { maximumFractionDigits: 1 });
  }

  function parseNum(val){
    return parseFloat(String(val).replace(',', '.'));
  }

  function render(){
    var ratioNum = parseNum(ratioInput.value);
    var volumeNum = parseNum(volumeInput.value);
    var valid = ratioNum > 0 && volumeNum > 0;

    buildPresets(ratioPresetsEl, RATIO_PRESETS, ':', function(){ return ratioNum; }, function(v){
      ratioInput.value = String(v);
      render();
    });
    buildPresets(volumePresetsEl, VOLUME_PRESETS, 'L', function(){ return volumeNum; }, function(v){
      volumeInput.value = String(v);
      render();
    });

    if (valid) {
      var totalML = volumeNum * 1000;
      var productML = totalML / ratioNum;
      var waterML = totalML - productML;
      var concentration = 100 / ratioNum;
      resultProduct.textContent = fmt(productML);
      resultWater.textContent = fmt(waterML);
      resultConcentration.textContent = fmt(concentration) + '%';
      emptyState.style.display = 'none';
    } else {
      resultProduct.textContent = '0';
      resultWater.textContent = '0';
      resultConcentration.textContent = '0%';
      emptyState.style.display = 'block';
    }
  }

  ratioInput.addEventListener('input', render);
  volumeInput.addEventListener('input', render);

  render();
})();

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('sw.js').catch(() => {});
  });
}
</script>
</body>
</html>
